<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LearnTrack">
<link rel="manifest" href="manifest.json">
<title>✦ LearnTrack</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0c;--bg2:#111114;--bg3:#18181c;--card:#131317;--card-h:#19191e;
  --border:rgba(255,255,255,0.06);--border-h:rgba(255,255,255,0.1);
  --accent:#FF5733;--accent-g:linear-gradient(135deg,#FF5733,#FF2200);--accent-soft:rgba(255,87,51,0.1);--accent-softer:rgba(255,87,51,0.05);
  --text:#fff;--text2:rgba(255,255,255,0.7);--muted:rgba(255,255,255,0.4);--dim:rgba(255,255,255,0.12);
  --radius:16px;--radius-sm:12px;--radius-xs:8px;
  --font-ar:'IBM Plex Sans Arabic',sans-serif;--font-en:'Inter','Space Grotesk',sans-serif;--mono:'Space Mono',monospace;
  --safe-b:env(safe-area-inset-bottom,0px);
}
body{background:var(--bg);color:var(--text);font-family:var(--font-ar);min-height:100vh;min-height:100dvh;overflow-x:hidden;transition:direction .3s}
body.en{direction:ltr;font-family:var(--font-en)}
input,textarea,button,select{font-family:inherit;border:none;outline:none;-webkit-appearance:none}
.mono{font-family:var(--mono)}
img{display:block;max-width:100%}
::-webkit-scrollbar{width:0;height:0}

/* === AMBIENT === */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ambient::before{content:'';position:absolute;top:-30%;right:-20%;width:700px;height:700px;background:radial-gradient(circle,rgba(255,87,51,0.035) 0%,transparent 70%);border-radius:50%}
.ambient::after{content:'';position:absolute;bottom:-40%;left:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(255,87,51,0.025) 0%,transparent 70%);border-radius:50%}
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.012;background-image:linear-gradient(rgba(255,255,255,.5) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.5) 1px,transparent 1px);background-size:50px 50px}

/* === LAYOUT === */
.app{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:16px 14px calc(80px + var(--safe-b))}

/* === NAV BAR (Bottom) === */
.navbar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,12,0.92);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 0 calc(8px + var(--safe-b));display:flex;justify-content:center;gap:0}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;color:var(--muted);transition:.2s;background:none;max-width:90px}
.nav-item.active{color:var(--accent)}
.nav-item .ni{font-size:20px}
.nav-item .nl{font-size:9px;letter-spacing:.5px;font-weight:500}

/* === HEADER === */
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius)}
.topbar-logo{display:flex;align-items:center;gap:10px}
.topbar-logo .icon{width:32px;height:32px;border-radius:8px;background:var(--accent-g);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.topbar-logo .name{font-weight:600;font-size:15px}
.topbar-actions{display:flex;gap:6px;align-items:center}
.btn{padding:8px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-weight:500;transition:all .2s;white-space:nowrap}
.btn:active{transform:scale(.96)}
.btn-ghost{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted)}
.btn-ghost.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border:none}
.btn-primary:active{background:#e04a2a}
.btn-sm{padding:6px 10px;font-size:11px;border-radius:var(--radius-xs)}
.btn-lang{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;font-weight:700;transition:.2s}

/* === DASHBOARD === */
.dash-hero{text-align:center;margin-bottom:32px;padding:28px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;position:relative;overflow:hidden}
.dash-hero::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:50%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,87,51,0.3),transparent)}
.dash-circle{position:relative;display:inline-block;margin-bottom:14px}
.dash-circle .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.dash-circle .pct-num{font-size:30px;font-weight:700;color:var(--accent)}
.dash-circle .pct-lbl{font-size:10px;color:var(--muted);margin-top:-2px}
.dash-hero h1{font-size:20px;font-weight:700;line-height:1.5;margin-bottom:4px}
.dash-hero h1 .hl{color:var(--accent)}
.dash-hero p{color:var(--muted);font-size:12px}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 8px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px}
.stat-card .si{font-size:14px;color:var(--dim)}
.stat-card .sv{font-size:20px;font-weight:700}
.stat-card .sl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

/* === SEARCH & FILTERS === */
.search-bar{margin-bottom:16px}
.search-bar input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;color:var(--text);font-size:13px;transition:border .2s}
.search-bar input:focus{border-color:rgba(255,87,51,0.3)}
.filters-row{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.ftab{padding:7px 14px;border-radius:var(--radius-sm);border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:500;transition:.2s;white-space:nowrap;flex-shrink:0}
.ftab.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.sort-row{display:flex;gap:6px;margin-bottom:20px;align-items:center}
.sort-row select{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xs);padding:6px 10px;color:var(--text2);font-size:11px;cursor:pointer}

/* === CARDS GRID === */
.items-grid{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:540px){.items-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:860px){.items-grid{grid-template-columns:repeat(3,1fr)}}

/* === ITEM CARD === */
.item-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .25s}
.item-card:active{transform:scale(.98);background:var(--card-h)}
.item-cover{width:100%;height:140px;background:var(--bg3);position:relative;overflow:hidden}
.item-cover img{width:100%;height:100%;object-fit:cover}
.item-cover .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,var(--bg3),#1e1e24)}
.item-cover .cat-pill{position:absolute;top:10px;right:10px;font-size:10px;padding:4px 10px;border-radius:20px;font-weight:600;backdrop-filter:blur(8px)}
body.en .item-cover .cat-pill{right:auto;left:10px}
.item-cover .progress-strip{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.06)}
.item-cover .progress-strip-fill{height:100%;transition:width .5s cubic-bezier(.4,0,.2,1)}
.item-body{padding:14px 16px}
.item-body h3{font-size:14px;font-weight:600;margin-bottom:4px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-body .desc{font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-body .meta-row{display:flex;justify-content:space-between;align-items:center}
.item-body .pct{font-size:18px;font-weight:700}
.item-body .units{font-size:10px;color:var(--muted)}
.item-body .star-rating{display:flex;gap:2px}
.item-body .star-rating span{font-size:12px;color:var(--dim)}
.item-body .star-rating span.filled{color:#FFB800}

/* === DETAIL VIEW === */
.detail-overlay{position:fixed;inset:0;z-index:200;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding-bottom:calc(20px + var(--safe-b))}
.detail-overlay.show{display:block;animation:slideUp .35s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.detail-back{position:sticky;top:0;z-index:10;background:rgba(10,10,12,0.9);backdrop-filter:blur(16px);padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.detail-back button{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.detail-back .title{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.detail-back .actions{display:flex;gap:6px}
.detail-cover-big{width:100%;height:200px;background:var(--bg3);position:relative;overflow:hidden}
.detail-cover-big img{width:100%;height:100%;object-fit:cover}
.detail-cover-big .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:60px;background:linear-gradient(135deg,var(--bg3),#1e1e24)}
.detail-info{padding:20px 16px}
.detail-info .cat-badge{display:inline-block;font-size:11px;padding:4px 12px;border-radius:20px;font-weight:600;margin-bottom:10px}
.detail-info h2{font-size:20px;font-weight:700;margin-bottom:8px;line-height:1.4}
.detail-info .desc-full{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:16px}
.detail-progress-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px}
.detail-progress-box .dp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.detail-progress-box .dp-pct{font-size:28px;font-weight:700;color:var(--accent)}
.detail-progress-box .dp-units{font-size:12px;color:var(--muted)}
.detail-pbar{height:6px;background:rgba(255,255,255,0.06);border-radius:6px;overflow:hidden}
.detail-pbar-fill{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* Rating */
.rating-section{margin-bottom:20px;display:flex;align-items:center;gap:10px}
.rating-section .label{font-size:12px;color:var(--muted)}
.rating-stars{display:flex;gap:4px}
.rating-stars span{font-size:24px;cursor:pointer;color:var(--dim);transition:.2s}
.rating-stars span.filled{color:#FFB800}
.rating-stars span:active{transform:scale(1.3)}

/* Lessons / Chapters list */
.lessons-section{margin-bottom:20px}
.lessons-section .ls-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.lessons-section .ls-title{font-size:14px;font-weight:600}
.lesson-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;transition:.2s}
.lesson-item:active{background:var(--bg3)}
.lesson-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:2px;transition:.2s;font-size:11px;color:transparent}
.lesson-check.done{background:var(--accent);border-color:var(--accent);color:#fff}
.lesson-body{flex:1;min-width:0}
.lesson-body .lt{font-size:13px;font-weight:500;margin-bottom:2px}
.lesson-body .lt.done-text{color:var(--muted);text-decoration:line-through}
.lesson-body .ln{font-size:11px;color:var(--muted);line-height:1.5}
.lesson-body .ln-input{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-xs);padding:6px 8px;color:var(--text2);font-size:11px;margin-top:4px;resize:none;min-height:28px;font-family:inherit}
.lesson-body .ln-input:focus{border-color:rgba(255,87,51,0.3)}
.lesson-actions{display:flex;gap:4px;flex-shrink:0}
.lesson-actions button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:4px;transition:.2s}
.lesson-actions button:active{color:var(--accent)}

/* Add lesson inline */
.add-lesson-row{display:flex;gap:8px;align-items:center}
.add-lesson-row input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xs);padding:10px 12px;color:var(--text);font-size:12px}
.add-lesson-row input:focus{border-color:rgba(255,87,51,0.3)}

/* === MODAL (Add/Edit Item) === */
.modal-overlay{position:fixed;inset:0;z-index:300;background:var(--bg);display:none;flex-direction:column;overflow:hidden}
.modal-overlay.show{display:flex}
.modal-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.modal-topbar h3{font-size:16px;font-weight:600;display:flex;align-items:center;gap:6px}
.modal-topbar h3 .dot{color:var(--accent)}
.modal-topbar button{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:50%;width:34px;height:34px;color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 18px 20px}
.modal-footer{padding:14px 18px calc(14px + var(--safe-b));border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:8px;flex-shrink:0}
.modal-footer .btn{padding:14px 16px;font-size:15px;font-weight:600;border-radius:var(--radius-sm)}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
@media(min-width:600px){.modal-scroll{max-width:500px;margin:0 auto}}
.modal-sheet h3{font-size:17px;font-weight:600;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.modal-sheet h3 .dot{color:var(--accent)}
.field-group{display:flex;flex-direction:column;gap:14px;margin-bottom:16px}
.field-label{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.field-input{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;color:var(--text);font-size:13px;transition:border .2s}
.field-input:focus{border-color:rgba(255,87,51,0.3)}
.field-textarea{resize:none;min-height:60px;font-family:inherit;line-height:1.6}
.field-file{position:relative;background:var(--bg3);border:2px dashed var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center;cursor:pointer;transition:.2s;overflow:hidden}
.field-file:active{border-color:var(--accent)}
.field-file input{position:absolute;inset:0;opacity:0;cursor:pointer}
.field-file .ff-icon{font-size:24px;margin-bottom:6px}
.field-file .ff-text{font-size:11px;color:var(--muted)}
.field-file .ff-preview{position:absolute;inset:0}
.field-file .ff-preview img{width:100%;height:100%;object-fit:cover;border-radius:var(--radius-sm)}
.field-file .ff-remove{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);border:none;color:#fff;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
body.en .field-file .ff-remove{right:auto;left:8px}
.cat-selector{display:flex;gap:6px;flex-wrap:wrap}
.cat-selector .cs-btn{padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(255,255,255,0.02);color:var(--muted);cursor:pointer;font-size:11px;transition:.2s;display:flex;align-items:center;gap:6px}
.cat-selector .cs-btn.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.cat-selector .cs-add{border-style:dashed}

/* Category Manager Modal */
.cat-mgr{margin-top:8px;padding:12px;background:var(--bg3);border-radius:var(--radius-sm);border:1px solid var(--border)}
.cat-mgr .cm-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.cat-mgr .cm-row input{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius-xs);padding:8px 10px;color:var(--text);font-size:12px}
.cat-mgr .cm-row input:focus{border-color:rgba(255,87,51,0.3)}
.cat-mgr .cm-emoji{width:44px;text-align:center}
.cat-mgr .cm-color{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);cursor:pointer;padding:0}

/* === SETTINGS PAGE === */
.settings-page{padding:0 2px}
.settings-page h2{font-size:18px;font-weight:700;margin-bottom:20px}
.setting-item{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px}
.setting-item .si-left{display:flex;flex-direction:column;gap:2px}
.setting-item .si-label{font-size:13px;font-weight:500}
.setting-item .si-desc{font-size:10px;color:var(--muted)}
.toggle{width:44px;height:24px;border-radius:14px;background:var(--bg3);border:1px solid var(--border);position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
.toggle.on{background:var(--accent);border-color:var(--accent)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s}
body.en .toggle::after{left:2px}
.toggle.on::after{left:22px}

/* === EMPTY STATE === */
.empty-state{text-align:center;padding:50px 20px;color:var(--dim)}
.empty-state .es-icon{font-size:40px;margin-bottom:10px}
.empty-state p{font-size:13px;margin-bottom:14px;color:var(--muted)}

/* === CONFIRM DIALOG === */
.confirm-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:.2s}
.confirm-overlay.show{opacity:1;pointer-events:all}
.confirm-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:340px;width:100%;text-align:center}
.confirm-box p{font-size:14px;margin-bottom:16px;line-height:1.6}
.confirm-box .cb-actions{display:flex;gap:8px;justify-content:center}
.confirm-box .cb-actions button{flex:1;padding:10px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:500}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);z-index:500;background:var(--bg2);border:1px solid var(--accent);border-radius:var(--radius-sm);padding:10px 20px;font-size:12px;color:var(--accent);transition:transform .4s cubic-bezier(.4,0,.2,1);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* circ */
.circ-svg{transform:rotate(-90deg)}.circ-bg{fill:none;stroke:rgba(255,255,255,0.06)}.circ-fg{fill:none;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}
</style>
</head>
<body>
<div class="ambient"></div><div class="grid-bg"></div>
<div class="app" id="app"></div>
<div id="navbar"></div>
<div class="toast" id="toast"></div>
<div class="confirm-overlay" id="confirmOverlay"><div class="confirm-box" id="confirmBox"></div></div>

<script>
// ======================== i18n ========================
const T = {
  ar: {
    appName: "متابع التعلّم", heroTitle1: "مستوى جديد من", heroHL1: "⚡ التعلّم", heroTitle2: "و", heroHL2: "# المتابعة الذكية",
    heroSub: "تتبع تقدمك في كل ما تتعلمه", total: "إجمالي", inProgress: "قيد التقدم", completed: "مكتمل", average: "متوسط",
    all: "الكل", searchPH: "🔍 ابحث...", addNew: "+ إضافة", favorites: "★ المفضلة", sortBy: "ترتيب:",

// ======================== SVG ========================
function circSvg(pct,size=44,stroke=3,color='#FF5733'){
  const r=(size-stroke)/2,c=2*Math.PI*r,off=c-(pct/100)*c;
  return `<svg class="circ-svg" width="${size}" height="${size}"><circle class="circ-bg" cx="${size/2}" cy="${size/2}" r="${r}" stroke-width="${stroke}"/><circle class="circ-fg" cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${c}" stroke-dashoffset="${off}"/></svg>`;
}
function starsHtml(rating, size=12) {
  let h='';for(let i=1;i<=5;i++) h+=`<span style="font-size:${size}px" class="${i<=rating?'filled':''}">${i<=rating?'★':'☆'}</span>`;
  return h;
}

function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

// ======================== CONFIRM ========================
let confirmCb=null;
function showConfirm(msg,cb){
  confirmCb=cb;
  document.getElementById('confirmBox').innerHTML=`<p>${msg}</p><div class="cb-actions"><button class="btn btn-ghost" onclick="closeConfirm()">${t('no')}</button><button class="btn btn-primary" onclick="doConfirm()">${t('yes')}</button></div>`;
  document.getElementById('confirmOverlay').classList.add('show');
}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('show');confirmCb=null;}

// ======================== COMPUTED ========================
function getFiltered(){
  let arr=[...S.items];
  if(S.starred) arr=arr.filter(i=>i.starred);
  if(S.filter!=='all') arr=arr.filter(i=>i.catId===S.filter);
  if(S.search) arr=arr.filter(i=>i.title.toLowerCase().includes(S.search.toLowerCase()));
  switch(S.sort){
    case 'oldest':arr.sort((a,b)=>new Date(a.dateAdded)-new Date(b.dateAdded));break;
    case 'progress':arr.sort((a,b)=>b.progress-a.progress);break;
    case 'name':arr.sort((a,b)=>a.title.localeCompare(b.title));break;
    default:arr.sort((a,b)=>new Date(b.dateAdded)-new Date(a.dateAdded));
  }
  return arr;
}
function calcProgress(item){
  if(!item.units||!item.units.length)return 0;
  const done=item.units.filter(u=>u.done).length;
  return Math.round((done/item.units.length)*100);
}
function getCat(id){return S.cats.find(c=>c.id===id)||S.cats[0];}

// ======================== RENDER ========================
function render(){
  renderNav();
  if(S.detailId) return renderDetail();
  const app=document.getElementById('app');
  if(S.page==='settings') return renderSettings(app);
  if(S.page==='browse') return renderBrowse(app);
  renderHome(app);
}

      <div class="topbar-logo"><div class="icon">✦</div><span class="name">${t('appName')}</span></div>

      <div class="stat-card"><span class="si">✓</span><span class="sv mono">${comp}</span><span class="sl">${t('completed')}</span></div>

      ${item.cover?`<img src="${item.cover}" alt="">`:`<div class="no-img">${cat.icon}</div>`}
      <div class="cat-pill" style="color:${cat.color};background:${cat.color}22">${cat.icon} ${catLabel(cat)}</div>
      <div class="progress-strip"><div class="progress-strip-fill" style="width:${item.progress}%;background:${cat.color}"></div></div>
    </div>
    <div class="item-body">
      <h3>${item.title}</h3>
      ${item.desc?`<p class="desc">${item.desc}</p>`:''}
      <div class="meta-row">
        <span class="pct mono" style="color:${cat.color}">${item.progress}%</span>
        <span class="units mono">${item.units?item.units.filter(u=>u.done).length:0}/${item.units?item.units.length:0}</span>

      ${item.rating?`<div class="star-rating">${starsHtml(item.rating)}</div>`:''}

}

let _modalCat='course',_modalCover='';
function openAddModal(){S.modal='add';S.catMgr=false;_modalCat='course';_modalCover='';render();}
function openEditModal(id){S.modal='edit';S.editId=id;S.catMgr=false;const item=S.items.find(i=>i.id===id);_modalCat=item?item.catId:'course';_modalCover=item?item.cover||'':'';render();}
function closeModal(){S.modal=null;S.catMgr=false;render();}
function selectModalCat(id){_modalCat=id;document.querySelectorAll('.cs-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===id));}
function toggleCatMgr(){S.catMgr=!S.catMgr;const el=document.getElementById('catMgrBox');if(el)el.style.display=S.catMgr?'block':'none';}
function clearModalCover(){_modalCover='';render();}
function handleCoverUpload(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{_modalCover=e.target.result;render();};
  reader.readAsDataURL(file);
}
function addCustomCat(){
  const emoji=document.getElementById('newCatEmoji')?.value||'📌';
  const name=document.getElementById('newCatName')?.value?.trim();
  const color=document.getElementById('newCatColor')?.value||'#E67E22';
  if(!name)return;
  const id='custom_'+Date.now();
  S.cats.push({id,label_ar:name,label_en:name,icon:emoji,color});
  save();_modalCat=id;S.catMgr=false;render();
}
function deleteCustomCat(id){
  showConfirm(t('deleteConfirmCat'),()=>{
    S.cats=S.cats.filter(c=>c.id!==id);
    S.items.forEach(i=>{if(i.catId===id)i.catId='course';});
    save();render();
  });
}
function saveModal(){
  const title=document.getElementById('m_title')?.value?.trim();
  if(!title)return;
  const desc=document.getElementById('m_desc')?.value?.trim()||'';
  if(S.modal==='edit'){
    S.items=S.items.map(i=>{
      if(i.id!==S.editId)return i;
      return {...i,title,desc,catId:_modalCat,cover:_modalCover};
    });
  } else {
    S.items.unshift({id:'i_'+Date.now(),title,desc,catId:_modalCat,cover:_modalCover,units:[],starred:false,rating:0,progress:0,dateAdded:new Date().toISOString().split('T')[0]});
  }
  save();closeModal();toast(t('saved'));
}

// ======================== ITEM ACTIONS ========================
function openDetail(id){S.detailId=id;render();}
function toggleItemStar(id){S.items=S.items.map(i=>i.id===id?{...i,starred:!i.starred}:i);save();render();}
function deleteItem(id){showConfirm(t('deleteConfirm'),()=>{S.items=S.items.filter(i=>i.id!==id);save();S.detailId=null;S.modal=null;render();toast(t('deleted'));});}
function rateItem(id,n){S.items=S.items.map(i=>i.id===id?{...i,rating:i.rating===n?0:n}:i);save();render();}

// ======================== UNITS ========================
function addUnit(itemId){
  const inp=document.getElementById('newUnitInput');if(!inp||!inp.value.trim())return;
  S.items=S.items.map(i=>{
    if(i.id!==itemId)return i;
    const units=[...(i.units||[]),{title:inp.value.trim(),done:false,note:''}];
    return{...i,units,progress:calcProgress({...i,units})};
  });
  save();render();
  setTimeout(()=>{const el=document.getElementById('newUnitInput');if(el)el.focus();},50);
}
function toggleUnit(itemId,idx){
  S.items=S.items.map(i=>{
    if(i.id!==itemId)return i;
    const units=i.units.map((u,j)=>j===idx?{...u,done:!u.done}:u);
    return{...i,units,progress:calcProgress({...i,units})};
  });
  save();render();
}
function updateUnitNote(itemId,idx,val){
  S.items=S.items.map(i=>{
    if(i.id!==itemId)return i;
    const units=i.units.map((u,j)=>j===idx?{...u,note:val}:u);
    return{...i,units};
  });
  save(); // don't re-render to keep focus
}
function removeUnit(itemId,idx){
  S.items=S.items.map(i=>{
    if(i.id!==itemId)return i;
    const units=i.units.filter((_,j)=>j!==idx);
    return{...i,units,progress:calcProgress({...i,units})};
  });
  save();render();
}

// ======================== SETTINGS ========================
function renderSettings(el){
  el.innerHTML=`
    <div class="topbar"><div class="topbar-logo"><div class="icon">⚙️</div><span class="name">${t('settings')}</span></div></div>
    <div class="settings-page">
      <div class="setting-item">
        <div class="si-left"><span class="si-label">${t('language')}</span><span class="si-desc">${t('langDesc')}</span></div>
        <button class="btn btn-ghost btn-sm" onclick="toggleLang()">${S.lang==='ar'?'English':'العربية'}</button>
      </div>
      <div class="setting-item">
        <div class="si-left"><span class="si-label">${t('exportData')}</span><span class="si-desc">${t('exportDesc')}</span></div>
        <button class="btn btn-ghost btn-sm" onclick="exportData()">📤</button>
      </div>
      <div class="setting-item">
        <div class="si-left"><span class="si-label">${t('importData')}</span><span class="si-desc">${t('importDesc')}</span></div>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('importFile').click()">📥</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
      </div>
      <div class="setting-item" style="border-color:rgba(255,68,68,0.2)">
        <div class="si-left"><span class="si-label" style="color:#ff4444">${t('resetData')}</span><span class="si-desc">${t('resetDesc')}</span></div>
        <button class="btn btn-sm" style="background:rgba(255,68,68,0.1);color:#ff4444;border:1px solid rgba(255,68,68,0.2);border-radius:8px;padding:6px 12px;cursor:pointer" onclick="resetData()">🗑️</button>
      </div>
    </div>
  `;
}
function exportData(){
  const data=JSON.stringify({items:S.items,cats:S.cats,lang:S.lang},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='learntrack-backup.json';a.click();
  toast(t('exported'));
}
function importData(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{const d=JSON.parse(e.target.result);if(d.items)S.items=d.items;if(d.cats)S.cats=d.cats;if(d.lang)S.lang=d.lang;save();render();toast(t('imported'));}catch{toast('Error!');}
  };
  reader.readAsText(file);
}
function resetData(){
  showConfirm(t('resetConfirm'),()=>{
    S.items=[];S.cats=[...defaultCats];save();render();toast(t('resetDone'));
  });
}

// ======================== PWA ========================
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

// ======================== INIT ========================
document.documentElement.lang=S.lang;document.documentElement.dir=S.lang==='ar'?'rtl':'ltr';
document.body.classList.toggle('en',S.lang==='en');
render();
</script>
</body>
