<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LearnTrack">
<link rel="manifest" href="manifest.json">
<title>✦ LearnTrack</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0a0a0c;--bg2:#111114;--bg3:#18181c;--card:#131317;--card-h:#19191e;
--border:rgba(255,255,255,0.06);--border-h:rgba(255,255,255,0.1);
--accent:#FF5733;--accent-g:linear-gradient(135deg,#FF5733,#FF2200);--accent-soft:rgba(255,87,51,0.1);
--text:#fff;--text2:rgba(255,255,255,0.7);--muted:rgba(255,255,255,0.4);--dim:rgba(255,255,255,0.12);
--radius:16px;--radius-sm:12px;--radius-xs:8px;
--font-ar:'IBM Plex Sans Arabic',sans-serif;--font-en:'Inter','Space Grotesk',sans-serif;--mono:'Space Mono',monospace;
--safe-b:env(safe-area-inset-bottom,0px);
}
body{background:var(--bg);color:var(--text);font-family:var(--font-ar);min-height:100dvh;overflow-x:hidden}
body.en{direction:ltr;font-family:var(--font-en)}
input,textarea,button,select{font-family:inherit;border:none;outline:none;-webkit-appearance:none}
.mono{font-family:var(--mono)}
img{display:block;max-width:100%}
::-webkit-scrollbar{width:0;height:0}

.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.ambient::before{content:'';position:absolute;top:-30%;right:-20%;width:700px;height:700px;background:radial-gradient(circle,rgba(255,87,51,0.035) 0%,transparent 70%);border-radius:50%}
.ambient::after{content:'';position:absolute;bottom:-40%;left:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(255,87,51,0.025) 0%,transparent 70%);border-radius:50%}
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.012;background-image:linear-gradient(rgba(255,255,255,.5) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.5) 1px,transparent 1px);background-size:50px 50px}

.app{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:16px 14px calc(80px + var(--safe-b))}

/* Login */
.login-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:20px;text-align:center}
.login-page .logo{font-size:48px;margin-bottom:16px}
.login-page h1{font-size:28px;font-weight:700;margin-bottom:8px}
.login-page h1 .hl{color:var(--accent)}
.login-page p{color:var(--muted);font-size:13px;margin-bottom:32px}
.login-page .g-btn{display:flex;align-items:center;gap:10px;background:#fff;color:#333;border-radius:var(--radius-sm);padding:14px 28px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;border:none}
.login-page .g-btn:active{transform:scale(.97)}
.login-page .g-btn img{width:20px;height:20px}
.login-page .skip{margin-top:16px;color:var(--muted);font-size:12px;cursor:pointer;background:none;border:none;text-decoration:underline}
.user-pill{display:flex;align-items:center;gap:8px;padding:6px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:20px;cursor:pointer}
.user-pill img{width:24px;height:24px;border-radius:50%}
.user-pill span{font-size:11px;color:var(--text2);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Navbar */
.navbar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,12,0.92);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 0 calc(8px + var(--safe-b));display:flex;justify-content:center}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;color:var(--muted);transition:.2s;background:none;max-width:80px}
.nav-item.active{color:var(--accent)}
.nav-item .ni{font-size:20px}
.nav-item .nl{font-size:8px;letter-spacing:.4px;font-weight:500}
.btn-lang{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;font-weight:700}

/* Topbar */
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius)}
.topbar-logo{display:flex;align-items:center;gap:8px}
.topbar-logo .icon{width:30px;height:30px;border-radius:8px;background:var(--accent-g);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.topbar-logo .name{font-weight:600;font-size:14px}
.topbar-actions{display:flex;gap:6px;align-items:center}
.btn{padding:7px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:11px;font-weight:500;transition:all .2s;white-space:nowrap}
.btn:active{transform:scale(.96)}
.btn-ghost{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--muted)}
.btn-ghost.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border:none}
.btn-sm{padding:5px 9px;font-size:10px;border-radius:var(--radius-xs)}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 6px;text-align:center}
.stat-card .sv{font-size:18px;font-weight:700;display:block}
.stat-card .sl{font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

/* Calendar */
.cal-section{margin-bottom:24px}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 4px}
.cal-header h3{font-size:14px;font-weight:600}
.cal-header .cal-nav{display:flex;gap:6px}
.cal-header .cal-nav button{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-name{text-align:center;font-size:9px;color:var(--muted);padding:6px 0;font-weight:600}
.cal-day{position:relative;text-align:center;padding:8px 2px;border-radius:8px;font-size:11px;cursor:pointer;transition:.15s;min-height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted)}
.cal-day.current-month{color:var(--text)}
.cal-day.today{background:var(--accent-soft);color:var(--accent);font-weight:700;border:1px solid rgba(255,87,51,0.3)}
.cal-day.has-items::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cal-day.has-items.multi::after{width:12px;border-radius:3px}
.cal-day.selected{background:var(--accent);color:#fff}
.cal-day.selected::after{background:#fff}
.cal-day:active{transform:scale(.9)}
.cal-day-items{margin-top:8px;padding:0 4px}
.cal-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xs);margin-bottom:6px;cursor:pointer;transition:.2s}
.cal-item:active{background:var(--bg3)}
.cal-item .ci-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cal-item .ci-title{font-size:11px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-item .ci-type{font-size:9px;color:var(--muted)}
.cal-item .ci-dates{font-size:9px;color:var(--dim)}

/* Search & Filters */
.search-bar{margin-bottom:12px}
.search-bar input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:12px}
.search-bar input:focus{border-color:rgba(255,87,51,0.3)}
.filters-row{display:flex;gap:5px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.filters-row::-webkit-scrollbar{display:none}
.ftab{padding:6px 12px;border-radius:var(--radius-sm);border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;font-size:11px;font-weight:500;transition:.2s;white-space:nowrap;flex-shrink:0}
.ftab.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.sort-row{display:flex;gap:6px;margin-bottom:16px;align-items:center}
.sort-row select{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xs);padding:5px 8px;color:var(--text2);font-size:10px;cursor:pointer}

/* Cards */
.items-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:540px){.items-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:860px){.items-grid{grid-template-columns:repeat(3,1fr)}}
.item-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:.25s}
.item-card:active{transform:scale(.98)}
.item-cover{width:100%;height:120px;background:var(--bg3);position:relative;overflow:hidden}
.item-cover img{width:100%;height:100%;object-fit:cover}
.item-cover .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,var(--bg3),#1e1e24)}
.item-cover .cat-pill{position:absolute;top:8px;right:8px;font-size:9px;padding:3px 8px;border-radius:16px;font-weight:600;backdrop-filter:blur(8px)}
body.en .item-cover .cat-pill{right:auto;left:8px}
.item-cover .progress-strip{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.06)}
.item-cover .progress-strip-fill{height:100%;transition:width .5s}
.item-body{padding:12px 14px}
.item-body h3{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-body .desc{font-size:10px;color:var(--muted);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.item-body .meta-row{display:flex;justify-content:space-between;align-items:center}
.item-body .pct{font-size:16px;font-weight:700}
.item-body .units{font-size:9px;color:var(--muted)}
.item-body .date-range{font-size:9px;color:var(--dim);margin-top:4px}
.star-rating span{font-size:10px;color:var(--dim)}
.star-rating span.filled{color:#FFB800}

/* Detail */
.detail-overlay{position:fixed;inset:0;z-index:200;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding-bottom:calc(20px + var(--safe-b))}
.detail-overlay.show{display:block;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.detail-back{position:sticky;top:0;z-index:10;background:rgba(10,10,12,0.92);backdrop-filter:blur(16px);padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.detail-back button{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.detail-back .title{font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.detail-back .actions{display:flex;gap:4px}
.detail-cover-big{width:100%;height:180px;background:var(--bg3);position:relative;overflow:hidden}
.detail-cover-big img{width:100%;height:100%;object-fit:cover}
.detail-cover-big .no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:50px;background:linear-gradient(135deg,var(--bg3),#1e1e24)}
.detail-info{padding:16px 14px}
.detail-info .cat-badge{display:inline-block;font-size:10px;padding:3px 10px;border-radius:16px;font-weight:600;margin-bottom:8px}
.detail-info h2{font-size:18px;font-weight:700;margin-bottom:6px;line-height:1.4}
.detail-info .desc-full{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:14px}
.detail-progress-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px}
.detail-progress-box .dp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.detail-progress-box .dp-pct{font-size:24px;font-weight:700;color:var(--accent)}
.detail-progress-box .dp-units{font-size:11px;color:var(--muted)}
.detail-pbar{height:5px;background:rgba(255,255,255,0.06);border-radius:5px;overflow:hidden}
.detail-pbar-fill{height:100%;border-radius:5px;transition:width .6s}

/* Date fields */
.date-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:16px}
.date-section .ds-title{font-size:12px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.date-row{display:flex;gap:8px;align-items:center}
.date-row label{font-size:10px;color:var(--muted);min-width:40px}
.date-row input[type="date"]{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius-xs);padding:8px 10px;color:var(--text);font-size:12px;font-family:var(--mono)}
.date-row input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1) brightness(0.6)}

/* Rating */
.rating-section{margin-bottom:16px;display:flex;align-items:center;gap:8px}
.rating-section .label{font-size:11px;color:var(--muted)}
.rating-stars{display:flex;gap:3px}
.rating-stars span{font-size:22px;cursor:pointer;color:var(--dim);transition:.2s}
.rating-stars span.filled{color:#FFB800}

/* Lessons */
.lessons-section{margin-bottom:16px}
.lessons-section .ls-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.lessons-section .ls-title{font-size:13px;font-weight:600}
.lesson-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px}
.lesson-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-top:1px;font-size:10px;color:transparent;transition:.2s}
.lesson-check.done{background:var(--accent);border-color:var(--accent);color:#fff}
.lesson-body{flex:1;min-width:0}
.lesson-body .lt{font-size:12px;font-weight:500;margin-bottom:2px}
.lesson-body .lt.done-text{color:var(--muted);text-decoration:line-through}
.lesson-body .ln-input{width:100%;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-xs);padding:5px 7px;color:var(--text2);font-size:10px;margin-top:3px;resize:none;min-height:24px;font-family:inherit}
.lesson-dates{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.lesson-dates input[type="date"]{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:4px;padding:3px 6px;color:var(--text2);font-size:9px;font-family:var(--mono);max-width:120px}
.lesson-dates input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1) brightness(0.6)}
.lesson-dates span{font-size:9px;color:var(--dim);line-height:24px}
.lesson-actions button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:3px}
.add-lesson-row{display:flex;gap:6px;align-items:center}
.add-lesson-row input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xs);padding:9px 10px;color:var(--text);font-size:11px}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:300;background:var(--bg);display:none;flex-direction:column;overflow:hidden}
.modal-overlay.show{display:flex}
.modal-topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-topbar h3{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px}
.modal-topbar h3 .dot{color:var(--accent)}
.modal-topbar button{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:50%;width:32px;height:32px;color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.modal-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px}
.modal-footer{padding:12px 16px calc(12px + var(--safe-b));border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:8px;flex-shrink:0}
.modal-footer .btn{padding:12px 14px;font-size:14px;font-weight:600;border-radius:var(--radius-sm)}
@media(min-width:600px){.modal-scroll{max-width:500px;margin:0 auto}}
.field-group{display:flex;flex-direction:column;gap:12px}
.field-label{font-size:10px;color:var(--muted);margin-bottom:3px;font-weight:500}
.field-input{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:12px;transition:border .2s}
.field-input:focus{border-color:rgba(255,87,51,0.3)}
.field-textarea{resize:none;min-height:50px;font-family:inherit;line-height:1.5}
.field-file{position:relative;background:var(--bg3);border:2px dashed var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;cursor:pointer;overflow:hidden}
.field-file input{position:absolute;inset:0;opacity:0;cursor:pointer}
.field-file .ff-icon{font-size:20px;margin-bottom:4px}
.field-file .ff-text{font-size:10px;color:var(--muted)}
.field-file .ff-preview{position:absolute;inset:0}
.field-file .ff-preview img{width:100%;height:100%;object-fit:cover}
.field-file .ff-remove{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.6);border:none;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
body.en .field-file .ff-remove{right:auto;left:6px}
.cat-selector{display:flex;gap:5px;flex-wrap:wrap}
.cat-selector .cs-btn{padding:7px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(255,255,255,0.02);color:var(--muted);cursor:pointer;font-size:10px;transition:.2s;display:flex;align-items:center;gap:4px}
.cat-selector .cs-btn.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.cat-selector .cs-add{border-style:dashed}
.cat-mgr{margin-top:6px;padding:10px;background:var(--bg3);border-radius:var(--radius-sm);border:1px solid var(--border)}
.cat-mgr .cm-row{display:flex;gap:5px;margin-bottom:6px;align-items:center}
.cat-mgr .cm-row input{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius-xs);padding:7px 8px;color:var(--text);font-size:11px}
.cat-mgr .cm-emoji{width:40px;text-align:center}
.cat-mgr .cm-color{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);cursor:pointer;padding:0}

/* Settings */
.setting-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px}
.setting-item .si-label{font-size:12px;font-weight:500}
.setting-item .si-desc{font-size:9px;color:var(--muted)}

/* Empty & Toast & Confirm */
.empty-state{text-align:center;padding:40px 20px;color:var(--dim)}
.empty-state .es-icon{font-size:36px;margin-bottom:8px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-60px);z-index:500;background:var(--bg2);border:1px solid var(--accent);border-radius:var(--radius-sm);padding:8px 18px;font-size:11px;color:var(--accent);transition:transform .4s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.confirm-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:.2s}
.confirm-overlay.show{opacity:1;pointer-events:all}
.confirm-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;max-width:320px;width:100%;text-align:center}
.confirm-box p{font-size:13px;margin-bottom:14px;line-height:1.5}
.confirm-box .cb-actions{display:flex;gap:8px;justify-content:center}
.confirm-box .cb-actions button{flex:1;padding:10px;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;font-weight:500}

/* Loading */

// ======================== DATA SYNC ========================
function saveLocal(){SS('lt_items2',S.items);SS('lt_cats',S.cats);SS('lt_lang',S.lang)}

async function saveCloud(){
  if(!currentUser)return saveLocal();
  saveLocal();
  try{
    await db.collection('users').doc(currentUser.uid).set({
      items:S.items, cats:S.cats, lang:S.lang, updated:firebase.firestore.FieldValue.serverTimestamp()
    });
  }catch(e){console.log('Cloud save failed, data saved locally',e)}
}

async function loadCloud(){
  if(!currentUser)return;
  try{
    const doc=await db.collection('users').doc(currentUser.uid).get();
    if(doc.exists){
      const d=doc.data();
      if(d.items)S.items=d.items;
      if(d.cats)S.cats=d.cats;
      if(d.lang)S.lang=d.lang;
      saveLocal();
    } else {
      await saveCloud();
    }
  }catch(e){console.log('Cloud load failed, using local',e)}
}

function save(){saveCloud()}

    showLoading(true);

function circSvg(p,sz=44,st=3,col='#FF5733'){
  const r=(sz-st)/2,c=2*Math.PI*r,o=c-(p/100)*c;
  return`<svg class="circ-svg" width="${sz}" height="${sz}"><circle class="circ-bg" cx="${sz/2}" cy="${sz/2}" r="${r}" stroke-width="${st}"/><circle class="circ-fg" cx="${sz/2}" cy="${sz/2}" r="${r}" stroke="${col}" stroke-width="${st}" stroke-dasharray="${c}" stroke-dashoffset="${o}"/></svg>`;
}
function starsHtml(r,sz=10){let h='';for(let i=1;i<=5;i++)h+=`<span style="font-size:${sz}px" class="${i<=r?'filled':''}">${i<=r?'★':'☆'}</span>`;return h}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2000)}
let confirmCb=null;
function showConfirm(m,cb){confirmCb=cb;document.getElementById('confirmBox').innerHTML=`<p>${m}</p><div class="cb-actions"><button class="btn btn-ghost" onclick="closeConfirm()">${t('no')}</button><button class="btn btn-primary" onclick="doConfirm()">${t('yes')}</button></div>`;document.getElementById('confirmOverlay').classList.add('show')}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('show')}
function doConfirm(){if(confirmCb)confirmCb();closeConfirm()}
function calcProgress(item){if(!item.units||!item.units.length)return 0;return Math.round((item.units.filter(u=>u.done).length/item.units.length)*100)}
function fmtDate(d){if(!d)return'';const dt=new Date(d);return dt.toLocaleDateString(S.lang==='ar'?'ar-SA':'en-US',{month:'short',day:'numeric'})}

// ---- MINI CALENDAR on HOME ----
function renderMiniCalendar(){
  const today=new Date();const y=S.calYear,m=S.calMonth;
  const firstDay=new Date(y,m,1).getDay();const daysInMonth=new Date(y,m+1,0).getDate();
  const monthName=new Date(y,m).toLocaleDateString(S.lang==='ar'?'ar-SA':'en-US',{month:'long',year:'numeric'});
  const dayNames=S.lang==='ar'?['أحد','إثن','ثلا','أرب','خمي','جمع','سبت']:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  
  // Get items with dates for this month
  const monthItems=S.items.filter(i=>{
    if(i.startDate){const d=new Date(i.startDate);if(d.getFullYear()===y&&d.getMonth()===m)return true}
    if(i.endDate){const d=new Date(i.endDate);if(d.getFullYear()===y&&d.getMonth()===m)return true}
    if(i.units)return i.units.some(u=>{
      if(u.startDate){const d=new Date(u.startDate);if(d.getFullYear()===y&&d.getMonth()===m)return true}
      if(u.endDate){const d=new Date(u.endDate);if(d.getFullYear()===y&&d.getMonth()===m)return true}
      return false;
    });
    return false;
  });
  
  function getDayItems(day){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    let res=[];
    S.items.forEach(it=>{
      if(it.startDate===ds||it.endDate===ds)res.push({...it,type:'item'});
      (it.units||[]).forEach((u,idx)=>{
        if(u.startDate===ds||u.endDate===ds)res.push({itemId:it.id,unitIdx:idx,title:u.title,parentTitle:it.title,catId:it.catId,type:'unit'});
      });
    });
    return res;
  }

  let days='';
  for(let i=0;i<firstDay;i++)days+=`<div class="cal-day"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const isToday=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    const sel=S.calSelected===d;
    const di=getDayItems(d);
    const hasSome=di.length>0;
    days+=`<div class="cal-day current-month${isToday?' today':''}${sel?' selected':''}${hasSome?' has-items':''}${di.length>1?' multi':''}" onclick="selectCalDay(${d})">${d}</div>`;
  }

  // Selected day items
  let selectedHtml='';
  if(S.calSelected){
    const di=getDayItems(S.calSelected);
    if(di.length){
      selectedHtml=di.map(x=>{
        const cat=getCat(x.catId);
        if(x.type==='item')return`<div class="cal-item" onclick="openDetail('${x.id}')"><div class="ci-dot" style="background:${cat.color}"></div><div class="ci-title">${x.title}</div><div class="ci-type">${catLabel(cat)}</div></div>`;
        return`<div class="cal-item" onclick="openDetail('${x.itemId}')"><div class="ci-dot" style="background:${cat.color}"></div><div class="ci-title">${x.title}</div><div class="ci-type">${x.parentTitle}</div></div>`;
      }).join('');
    } else {
      selectedHtml=`<div style="text-align:center;padding:12px;color:var(--dim);font-size:11px">${t('noSchedule')}</div>`;
    }
  }

  return`<div class="cal-section">
    <div class="cal-header">
      <h3>📅 ${monthName}</h3>
      <div class="cal-nav">
        <button onclick="calPrev()">‹</button>
        <button onclick="calToday()">●</button>
        <button onclick="calNext()">›</button>
      </div>
    </div>
    <div class="cal-grid">${dayNames.map(d=>`<div class="cal-day-name">${d}</div>`).join('')}${days}</div>
    <div class="cal-day-items">${selectedHtml}</div>
  </div>`;
}

function selectCalDay(d){S.calSelected=S.calSelected===d?null:d;render()}
function calPrev(){S.calMonth--;if(S.calMonth<0){S.calMonth=11;S.calYear--}S.calSelected=null;render()}
function calNext(){S.calMonth++;if(S.calMonth>11){S.calMonth=0;S.calYear++}S.calSelected=null;render()}
function calToday(){const t=new Date();S.calYear=t.getFullYear();S.calMonth=t.getMonth();S.calSelected=t.getDate();render()}

function renderCalendar(el){

  </div>${renderMiniCalendar()}${renderModal()}`;
}

// ---- BROWSE ----
function getFiltered(){
  let arr=[...S.items];
  if(S.starred)arr=arr.filter(i=>i.starred);
  if(S.filter!=='all')arr=arr.filter(i=>i.catId===S.filter);
  if(S.search)arr=arr.filter(i=>i.title.toLowerCase().includes(S.search.toLowerCase()));
  switch(S.sort){case 'oldest':arr.sort((a,b)=>new Date(a.dateAdded)-new Date(b.dateAdded));break;case 'progress':arr.sort((a,b)=>b.progress-a.progress);break;case 'name':arr.sort((a,b)=>a.title.localeCompare(b.title));break;default:arr.sort((a,b)=>new Date(b.dateAdded)-new Date(a.dateAdded))}
  return arr;
}

function renderBrowse(el){
  const f=getFiltered();
  el.innerHTML=`<div class="topbar"><div class="topbar-logo"><div class="icon">✦</div><span class="name">${t('browse')}</span></div>

      <span class="mono" style="margin-${S.lang==='ar'?'right':'left'}:auto;font-size:10px;color:var(--dim)">${f.length}</span></div>
    <div class="items-grid">${f.map(i=>cardHtml(i)).join('')}</div>
    ${f.length===0?`<div class="empty-state"><div class="es-icon">📭</div><p>${t('noItems')}</p><button class="btn btn-ghost" onclick="S.filter='all';S.starred=false;S.search='';render()">${t('showAll')}</button></div>`:''}

// ---- CARD ----
function cardHtml(item){
  const cat=getCat(item.catId);
  const dateStr=item.startDate||item.endDate?`${fmtDate(item.startDate)} → ${fmtDate(item.endDate)}`:'';
  return`<div class="item-card" onclick="openDetail('${item.id}')">
    <div class="item-cover">${item.cover?`<img src="${item.cover}">`:`<div class="no-img">${cat.icon}</div>`}
      <div class="cat-pill" style="color:${cat.color};background:${cat.color}22">${cat.icon} ${catLabel(cat)}</div>
      <div class="progress-strip"><div class="progress-strip-fill" style="width:${item.progress}%;background:${cat.color}"></div></div></div>
    <div class="item-body"><h3>${item.title}</h3>${item.desc?`<p class="desc">${item.desc}</p>`:''}
      <div class="meta-row"><span class="pct mono" style="color:${cat.color}">${item.progress}%</span><span class="units mono">${item.units?item.units.filter(u=>u.done).length:0}/${item.units?item.units.length:0}</span></div>
      ${dateStr?`<div class="date-range">📅 ${dateStr}</div>`:''}
      ${item.rating?`<div class="star-rating">${starsHtml(item.rating)}</div>`:''}</div></div>`;
}

// ---- DETAIL ----
function renderDetail(){
  const item=S.items.find(i=>i.id===S.detailId);if(!item)return goPage('home');
  const cat=getCat(item.catId);
  const uLabel=item.catId==='book'?t('chapters'):item.catId==='course'||item.catId==='youtube'?t('lessons'):t('items_label');
  const addPH=item.catId==='book'?t('addChapter'):item.catId==='course'||item.catId==='youtube'?t('addLesson'):t('addUnit');
  const app=document.getElementById('app');
  app.innerHTML=`<div class="detail-overlay show">
    <div class="detail-back">
      <button onclick="S.detailId=null;render()">←</button>
      <span class="title">${item.title}</span>
      <div class="actions">
        <button class="btn btn-sm btn-ghost" onclick="S.detailId=null;openEditModal('${item.id}')">✏️</button>
        <button class="btn btn-sm btn-ghost" onclick="toggleItemStar('${item.id}')" style="color:${item.starred?'var(--accent)':'var(--dim)'}">${item.starred?'★':'☆'}</button>
        <button class="btn btn-sm btn-ghost" onclick="deleteItem('${item.id}')" style="color:#ff4444">🗑️</button>
      </div>
    </div>
    <div class="detail-cover-big">${item.cover?`<img src="${item.cover}">`:`<div class="no-img">${cat.icon}</div>`}</div>
    <div class="detail-info">
      <div class="cat-badge" style="color:${cat.color};background:${cat.color}22">${cat.icon} ${catLabel(cat)}</div>
      <h2>${item.title}</h2>
      ${item.desc?`<p class="desc-full">${item.desc}</p>`:''}
      <div class="detail-progress-box">
        <div class="dp-top"><span class="dp-pct mono">${item.progress}%</span><span class="dp-units mono">${item.units?item.units.filter(u=>u.done).length:0} ${t('of')} ${item.units?item.units.length:0} ${uLabel}</span></div>
        <div class="detail-pbar"><div class="detail-pbar-fill" style="width:${item.progress}%;background:${cat.color}"></div></div>
      </div>
      <div class="date-section">
        <div class="ds-title">📅 ${t('schedule')}</div>
        <div class="date-row" style="margin-bottom:8px">
          <label>${t('startDate')}</label>
          <input type="date" value="${item.startDate||''}" onchange="updateItemDate('${item.id}','startDate',this.value)">
          <label>${t('endDate')}</label>
          <input type="date" value="${item.endDate||''}" onchange="updateItemDate('${item.id}','endDate',this.value)">
        </div>
      </div>
      <div class="rating-section">
        <span class="label">${t('rating')}:</span>
        <div class="rating-stars">${[1,2,3,4,5].map(n=>`<span class="${n<=(item.rating||0)?'filled':''}" onclick="rateItem('${item.id}',${n})">${n<=(item.rating||0)?'★':'☆'}</span>`).join('')}</div>
      </div>
      <div class="lessons-section">
        <div class="ls-header"><span class="ls-title">${uLabel} (${item.units?item.units.length:0})</span></div>
        ${(item.units||[]).map((u,idx)=>`
          <div class="lesson-item">
            <div class="lesson-check ${u.done?'done':''}" onclick="toggleUnit('${item.id}',${idx})">${u.done?'✓':''}</div>
            <div class="lesson-body">
              <div class="lt ${u.done?'done-text':''}">${u.title}</div>
              <div class="lesson-dates">
                <input type="date" value="${u.startDate||''}" onchange="updateUnitDate('${item.id}',${idx},'startDate',this.value)" placeholder="${t('startDate')}">
                <span>→</span>
                <input type="date" value="${u.endDate||''}" onchange="updateUnitDate('${item.id}',${idx},'endDate',this.value)" placeholder="${t('endDate')}">
              </div>
              <textarea class="ln-input" placeholder="${t('notePH')}" oninput="updateUnitNote('${item.id}',${idx},this.value)">${u.note||''}</textarea>
            </div>
            <div class="lesson-actions"><button onclick="removeUnit('${item.id}',${idx})">✕</button></div>
          </div>`).join('')}
        <div class="add-lesson-row">
          <input id="newUnitInput" placeholder="${addPH}" onkeydown="if(event.key==='Enter')addUnit('${item.id}')">
          <button class="btn btn-primary btn-sm" onclick="addUnit('${item.id}')">+</button>
        </div>
      </div>
    </div>
  </div>${renderModal()}`;
}

// ======================== MODAL ========================
function renderModal(){
  if(!S.modal)return'';
  const isEdit=S.modal==='edit';const item=isEdit?S.items.find(i=>i.id===S.editId):null;
  const ti=item?item.title:'',de=item?item.desc||'':'',ci=item?item.catId:'course',cv=item?item.cover||'':'';
  const sd=item?item.startDate||'':'',ed=item?item.endDate||'':'';
  return`<div class="modal-overlay show">
    <div class="modal-topbar"><button onclick="closeModal()">✕</button><h3><span class="dot">✦</span> ${isEdit?t('editItem'):t('addItem')}</h3><div style="width:32px"></div></div>
    <div class="modal-scroll"><div class="field-group">
      <div><div class="field-label">${t('coverImage')}</div>
        <div class="field-file" onclick="document.getElementById('coverFileInput').click()">
          ${cv?`<div class="ff-preview"><img src="${cv}"><button class="ff-remove" onclick="event.stopPropagation();clearModalCover()">✕</button></div>`:''}
          <div class="ff-icon">📷</div><div class="ff-text">${t('uploadImage')}</div>
          <input type="file" id="coverFileInput" accept="image/*" onchange="handleCoverUpload(this)" style="display:none"></div></div>
      <div><div class="field-label">${S.lang==='ar'?'العنوان':'Title'}</div><input class="field-input" id="m_title" placeholder="${t('titlePH')}" value="${ti}"></div>
      <div><div class="field-label">${S.lang==='ar'?'الوصف':'Description'}</div><textarea class="field-input field-textarea" id="m_desc" placeholder="${t('descPH')}">${de}</textarea></div>
      <div><div class="field-label">📅 ${t('schedule')}</div>
        <div class="date-row"><label>${t('startDate')}</label><input type="date" class="field-input" id="m_start" value="${sd}"><label>${t('endDate')}</label><input type="date" class="field-input" id="m_end" value="${ed}"></div></div>
      <div><div class="field-label">${t('category')}</div>
        <div class="cat-selector" id="catSelector">
          ${S.cats.map(c=>`<button class="cs-btn ${ci===c.id?'active':''}" onclick="selectModalCat('${c.id}')" data-cat="${c.id}">${c.icon} ${catLabel(c)}</button>`).join('')}
          <button class="cs-btn cs-add" onclick="toggleCatMgr()">+ ${S.lang==='ar'?'مخصص':'Custom'}</button></div>
        <div class="cat-mgr" id="catMgrBox" style="display:${S.catMgr?'block':'none'}">
          <div class="cm-row"><input class="cm-emoji" id="newCatEmoji" placeholder="📌" maxlength="2"><input id="newCatName" placeholder="${t('catName')}"><input type="color" class="cm-color" id="newCatColor" value="#E67E22"><button class="btn btn-primary btn-sm" onclick="addCustomCat()">+</button></div>
          ${S.cats.filter(c=>!['course','book','youtube','podcast','article'].includes(c.id)).map(c=>`<div class="cm-row" style="justify-content:space-between;padding:4px 0"><span style="font-size:11px">${c.icon} ${catLabel(c)}</span><button style="color:#ff4444;background:none;border:none;font-size:11px;cursor:pointer" onclick="deleteCustomCat('${c.id}')">✕</button></div>`).join('')}
        </div></div>
    </div></div>
    <div class="modal-footer">
      ${isEdit?`<button class="btn btn-ghost" style="flex:1;color:#ff4444;border-color:rgba(255,68,68,0.3)" onclick="deleteItem('${S.editId}')">${t('delete')}</button>`:''}
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">${t('cancel')}</button>
      <button class="btn btn-primary" style="flex:2" onclick="saveModal()">${t('save')}</button>
    </div></div>`;
}

let _modalCat='course',_modalCover='';
function openAddModal(){S.modal='add';S.catMgr=false;_modalCat='course';_modalCover='';render()}
function openEditModal(id){S.modal='edit';S.editId=id;S.catMgr=false;const item=S.items.find(i=>i.id===id);_modalCat=item?item.catId:'course';_modalCover=item?item.cover||'':'';render()}
function closeModal(){S.modal=null;S.catMgr=false;render()}
function selectModalCat(id){_modalCat=id;document.querySelectorAll('.cs-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===id))}
function toggleCatMgr(){S.catMgr=!S.catMgr;const el=document.getElementById('catMgrBox');if(el)el.style.display=S.catMgr?'block':'none'}
function clearModalCover(){_modalCover='';render()}
function handleCoverUpload(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{_modalCover=e.target.result;render()};r.readAsDataURL(f)}
function addCustomCat(){
  const emoji=document.getElementById('newCatEmoji')?.value||'📌',name=document.getElementById('newCatName')?.value?.trim(),color=document.getElementById('newCatColor')?.value||'#E67E22';
  if(!name)return;S.cats.push({id:'c_'+Date.now(),label_ar:name,label_en:name,icon:emoji,color});save();_modalCat=S.cats[S.cats.length-1].id;S.catMgr=false;render();
}
function deleteCustomCat(id){showConfirm(t('deleteConfirmCat'),()=>{S.cats=S.cats.filter(c=>c.id!==id);S.items.forEach(i=>{if(i.catId===id)i.catId='course'});save();render()})}

function saveModal(){
  const title=document.getElementById('m_title')?.value?.trim();if(!title)return;
  const desc=document.getElementById('m_desc')?.value?.trim()||'';
  const startDate=document.getElementById('m_start')?.value||'';
  const endDate=document.getElementById('m_end')?.value||'';
  if(S.modal==='edit'){
    S.items=S.items.map(i=>i.id===S.editId?{...i,title,desc,catId:_modalCat,cover:_modalCover,startDate,endDate}:i);
  }else{
    S.items.unshift({id:'i_'+Date.now(),title,desc,catId:_modalCat,cover:_modalCover,units:[],starred:false,rating:0,progress:0,startDate,endDate,dateAdded:new Date().toISOString().split('T')[0]});
  }
  save();closeModal();toast(t('saved'));
}

// ======================== ITEM ACTIONS ========================
function openDetail(id){S.detailId=id;render()}
function toggleItemStar(id){S.items=S.items.map(i=>i.id===id?{...i,starred:!i.starred}:i);save();render()}
function deleteItem(id){showConfirm(t('deleteConfirm'),()=>{S.items=S.items.filter(i=>i.id!==id);save();S.detailId=null;S.modal=null;render();toast(t('deleted'))})}
function rateItem(id,n){S.items=S.items.map(i=>i.id===id?{...i,rating:i.rating===n?0:n}:i);save();render()}
function updateItemDate(id,field,val){S.items=S.items.map(i=>i.id===id?{...i,[field]:val}:i);save()}

// ======================== UNITS ========================
function addUnit(itemId){
  const inp=document.getElementById('newUnitInput');if(!inp||!inp.value.trim())return;
  S.items=S.items.map(i=>{if(i.id!==itemId)return i;const units=[...(i.units||[]),{title:inp.value.trim(),done:false,note:'',startDate:'',endDate:''}];return{...i,units,progress:calcProgress({...i,units})}});
  save();render();setTimeout(()=>{const el=document.getElementById('newUnitInput');if(el)el.focus()},50);
}
function toggleUnit(itemId,idx){
  S.items=S.items.map(i=>{if(i.id!==itemId)return i;const units=i.units.map((u,j)=>j===idx?{...u,done:!u.done}:u);return{...i,units,progress:calcProgress({...i,units})}});
  save();render();
}
function updateUnitNote(itemId,idx,val){S.items=S.items.map(i=>{if(i.id!==itemId)return i;const units=i.units.map((u,j)=>j===idx?{...u,note:val}:u);return{...i,units}});save()}
function updateUnitDate(itemId,idx,field,val){S.items=S.items.map(i=>{if(i.id!==itemId)return i;const units=i.units.map((u,j)=>j===idx?{...u,[field]:val}:u);return{...i,units}});save();render()}
function removeUnit(itemId,idx){S.items=S.items.map(i=>{if(i.id!==itemId)return i;const units=i.units.filter((_,j)=>j!==idx);return{...i,units,progress:calcProgress({...i,units})}});save();render()}

// ======================== SETTINGS ========================
function renderSettings(el){
  el.innerHTML=`<div class="topbar"><div class="topbar-logo"><div class="icon">⚙️</div><span class="name">${t('settings')}</span></div>
    <div class="topbar-actions"><button class="btn-lang" onclick="toggleLang()">${S.lang==='ar'?'EN':'ع'}</button></div></div>
    ${currentUser?`<div class="setting-item"><div><span class="si-label">${currentUser.displayName||currentUser.email}</span><span class="si-desc" style="display:block">${currentUser.email||''}</span></div>
      <button class="btn btn-ghost btn-sm" onclick="signOut()">${t('signOut')}</button></div>`:`<div class="setting-item"><div><span class="si-label">${t('signIn')}</span></div>
      <button class="btn btn-primary btn-sm" onclick="signInGoogle()">Google</button></div>`}
    <div class="setting-item"><div><span class="si-label">${t('language')}</span><span class="si-desc" style="display:block">${t('langDesc')}</span></div><button class="btn btn-ghost btn-sm" onclick="toggleLang()">${S.lang==='ar'?'English':'العربية'}</button></div>
    <div class="setting-item"><div><span class="si-label">${t('exportData')}</span></div><button class="btn btn-ghost btn-sm" onclick="exportData()">📤</button></div>
    <div class="setting-item"><div><span class="si-label">${t('importData')}</span></div><button class="btn btn-ghost btn-sm" onclick="document.getElementById('importFile').click()">📥</button><input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)"></div>
    <div class="setting-item" style="border-color:rgba(255,68,68,0.2)"><div><span class="si-label" style="color:#ff4444">${t('resetData')}</span></div><button class="btn btn-sm" style="background:rgba(255,68,68,0.1);color:#ff4444;border:1px solid rgba(255,68,68,0.2);border-radius:8px;padding:5px 10px;cursor:pointer" onclick="resetData()">🗑️</button></div>`;
}
function exportData(){const d=JSON.stringify({items:S.items,cats:S.cats,lang:S.lang},null,2);const b=new Blob([d],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='learntrack-backup.json';a.click();toast(t('exported'))}
function importData(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.items)S.items=d.items;if(d.cats)S.cats=d.cats;save();render();toast(t('imported'))}catch{toast('Error!')}};r.readAsText(f)}
function resetData(){showConfirm(t('resetConfirm'),()=>{S.items=[];S.cats=[...defaultCats];save();render();toast(t('resetDone'))})}

// ======================== PWA ========================
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
